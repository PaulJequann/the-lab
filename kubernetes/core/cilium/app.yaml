---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium-helm
  namespace: argocd
  annotations:
    # Deploy Cilium very early in the process, before other apps
    argocd.argoproj.io/sync-wave: "-10"
spec:
  project: default
  source:
    repoURL: https://helm.cilium.io
    chart: cilium
    targetRevision: 1.17.1
    helm:
      releaseName: cilium
      values: |
        ingressController:
          enabled: true
          loadbalancerMode: shared
          default: true
          service:
            type: LoadBalancer

        kubeProxyReplacement: "true"
        hubble:
          relay:
            enabled: true
          ui:
            enabled: true

        # IPAM and routing settings
        ipam:
          mode: "cluster-pool"
          operator:
            clusterPoolIPv4PodCIDRList:
              - "10.42.0.0/16"
        
        # Point Cilium to the Kubernetes API
        k8sServiceHost: "10.0.10.50"
        k8sServicePort: 6443
        gatewayAPI:
          enabled: false
        loadBalancer:
          serviceTopology: true
          algorithm: maglev
        operator:
          replicas: 1
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  ignoreDifferences:
    # cilium-config data is mutated by the Cilium operator at runtime
    # (cluster identity, BPF feature toggles, etc.)
    - group: ""
      kind: ConfigMap
      name: cilium-config
      namespace: kube-system
      jsonPointers:
        - /data
    # cilium-ingress Service is decorated by kube-vip (annotations/labels)
    # and the Service controller (nodePort, loadBalancerIP)
    - group: ""
      kind: Service
      name: cilium-ingress
      namespace: kube-system
      jqPathExpressions:
        - '.metadata.annotations["kube-vip.io/loadbalancerIPs"]'
        - '.metadata.annotations["kube-vip.io/vipHost"]'
        - '.metadata.labels.implementation'
        - '.spec.loadBalancerIP'
        - '.spec.allocateLoadBalancerNodePorts'
        - '.spec.ports[].nodePort'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
