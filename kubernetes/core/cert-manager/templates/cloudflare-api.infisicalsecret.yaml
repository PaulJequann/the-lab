---
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  labels:
    app.kubernetes.io/managed-by: infisical-operator
spec:
  hostAPI: http://infisical.infisical.svc.cluster.local:8080/api
  syncConfig:
    resyncInterval: 60s
  authentication:
    kubernetesAuth:
      identityId: 3faa50da-6467-4568-aa22-da12507306de
      autoCreateServiceAccountToken: true
      serviceAccountRef:
        name: infisical-opera-controller-manager
        namespace: infisical-operator
      secretsScope:
        projectSlug: the-lab-kjtq
        envSlug: prod
        secretsPath: /kubernetes/cert-manager
        recursive: false
  managedKubeSecretReferences:
    - secretName: cloudflare-api-token
      secretNamespace: cert-manager
      secretType: Opaque
      creationPolicy: Owner
      template:
        includeAllSecrets: false
        data:
          cloudflare-api-token: "{{ .cloudflare_api_token }}"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wait-for-cloudflare-api-token
  namespace: cert-manager
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: wait-for-cloudflare-api-token
  namespace: cert-manager
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["cloudflare-api-token"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: wait-for-cloudflare-api-token
  namespace: cert-manager
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: wait-for-cloudflare-api-token
subjects:
  - kind: ServiceAccount
    name: wait-for-cloudflare-api-token
    namespace: cert-manager
---
apiVersion: batch/v1
kind: Job
metadata:
  name: wait-for-cloudflare-api-token
  namespace: cert-manager
  annotations:
    # Job runs in the wave AFTER its RBAC so SA/Role/RoleBinding are guaranteed
    # committed before the pod starts (avoids 403 Forbidden race).
    argocd.argoproj.io/sync-wave: "-4"
spec:
  # backoffLimit=2 tolerates transient pod failures (image-pull flakes,
  # first-boot Cilium policy enforcement hiccups) without blocking the sync.
  backoffLimit: 2
  activeDeadlineSeconds: 300
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wait-for-cloudflare-api-token
    spec:
      serviceAccountName: wait-for-cloudflare-api-token
      restartPolicy: Never
      containers:
        - name: wait
          image: bitnami/kubectl:1.30.4
          command:
            - /bin/sh
            - -ec
            - |
              SECRET="cloudflare-api-token"
              NS="cert-manager"
              KEYS="cloudflare-api-token"
              echo "Waiting for Secret ${NS}/${SECRET} to exist..."
              until kubectl get secret "${SECRET}" -n "${NS}" >/dev/null 2>&1; do
                sleep 2
              done
              echo "Secret exists. Waiting for required keys: ${KEYS}"
              for KEY in ${KEYS}; do
                # Bracket notation so hyphenated key names work. Dot notation
                # (kubectl's Go jsonpath) treats '-' as subtraction.
                until [ -n "$(kubectl get secret "${SECRET}" -n "${NS}" -o jsonpath="{.data['${KEY}']}")" ]; do
                  sleep 2
                done
                echo "  - ${KEY} populated"
              done
              echo "All required keys present. Proceeding."

