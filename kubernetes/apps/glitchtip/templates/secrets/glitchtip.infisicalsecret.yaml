---
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: glitchtip-secrets
  namespace: glitchtip
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  labels:
    app.kubernetes.io/managed-by: infisical-operator
spec:
  hostAPI: http://infisical.infisical.svc.cluster.local:8080/api
  syncConfig:
    resyncInterval: 60s
  authentication:
    kubernetesAuth:
      identityId: 3faa50da-6467-4568-aa22-da12507306de
      autoCreateServiceAccountToken: true
      serviceAccountRef:
        name: infisical-opera-controller-manager
        namespace: infisical-operator
      secretsScope:
        projectSlug: the-lab-kjtq
        envSlug: prod
        secretsPath: /kubernetes/glitchtip
        recursive: false
  managedKubeSecretReferences:
    - secretName: glitchtip-secrets
      secretNamespace: glitchtip
      secretType: Opaque
      creationPolicy: Owner
      # Raw components come verbatim via includeAllSecrets; composed URLs are
      # rendered at reconcile time from those raw values.
      #
      # !!! ROTATION CONSTRAINT !!!
      # POSTGRES_PASSWORD and REDIS_PASSWORD are interpolated into URLs below
      # without URL-encoding. Current values are hex so this is safe, but any
      # future rotation MUST produce alphanumeric-only passwords. Characters
      # `:`, `@`, `/`, `?`, `#`, `%` would corrupt DATABASE_URL/REDIS_URL and
      # break glitchtip connectivity. See previous seal_secret template's
      # `urlencode` filter for the pre-A.9 behavior being deliberately simplified.
      template:
        includeAllSecrets: true
        data:
          # Double-escape gotcha: this chart is rendered by Helm first, THEN
          # handed to the Infisical operator. Helm would otherwise consume
          # `{{ .KEY }}` in its own context (missing key → empty). The backtick
          # form is Helm's pass-through literal — it emits `{{ .KEY.Value }}`
          # verbatim into the applied manifest, where the operator's Go template
          # engine evaluates it. `.Value` is the accessor the operator v0.10.32
          # exposes (verified empirically; the plan examples omitted it).
          DATABASE_URL: '{{ `postgresql://{{ .POSTGRES_USER.Value }}:{{ .POSTGRES_PASSWORD.Value }}@{{ .DB_HOST.Value }}:{{ .DB_PORT.Value }}/{{ .POSTGRES_DB.Value }}` }}'          MAINTENANCE_DATABASE_URL: '{{ `postgresql://{{ .POSTGRES_USER.Value }}:{{ .POSTGRES_PASSWORD.Value }}@{{ .DB_HOST.Value }}:{{ .DB_PORT.Value }}/{{ .POSTGRES_DB.Value }}` }}'          REDIS_URL: '{{ `redis://:{{ .REDIS_PASSWORD.Value }}@{{ .DB_HOST.Value }}:{{ .REDIS_PORT.Value }}/0` }}'---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wait-for-glitchtip-secrets
  namespace: glitchtip
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: wait-for-glitchtip-secrets
  namespace: glitchtip
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["glitchtip-secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: wait-for-glitchtip-secrets
  namespace: glitchtip
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: wait-for-glitchtip-secrets
subjects:
  - kind: ServiceAccount
    name: wait-for-glitchtip-secrets
    namespace: glitchtip
---
apiVersion: batch/v1
kind: Job
metadata:
  name: wait-for-glitchtip-secrets
  namespace: glitchtip
  annotations:
    # Job runs in the wave AFTER its RBAC so SA/Role/RoleBinding are guaranteed
    # committed before the pod starts (avoids 403 Forbidden race).
    argocd.argoproj.io/sync-wave: "-4"
spec:
  # backoffLimit=2 tolerates transient pod failures (image-pull flakes,
  # first-boot Cilium policy enforcement hiccups) without blocking the sync.
  backoffLimit: 2
  activeDeadlineSeconds: 300
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wait-for-glitchtip-secrets
    spec:
      serviceAccountName: wait-for-glitchtip-secrets
      restartPolicy: Never
      containers:
        - name: wait
          # Bitnami migrated free images to bitnamilegacy/* in Aug 2025, so the
          # prior bitnami/kubectl:1.30.4 tag returns NotFound. bitnamilegacy is
          # the literal drop-in and preserves the minideb base (has /bin/sh for
          # this shell loop). rancher/kubectl would be the k3s-native choice
          # but ships distroless — no shell, breaks `command: [/bin/sh, -ec]`.
          image: bitnamilegacy/kubectl:1.30.4
          command:
            - /bin/sh
            - -ec
            - |
              SECRET="glitchtip-secrets"
              NS="glitchtip"
              KEYS="SECRET_KEY DATABASE_URL MAINTENANCE_DATABASE_URL REDIS_URL EMAIL_URL ADMIN_USERNAME ADMIN_EMAIL ADMIN_PASSWORD BOOTSTRAP_MCP_TOKEN"
              echo "Waiting for Secret ${NS}/${SECRET} to exist..."
              until kubectl get secret "${SECRET}" -n "${NS}" >/dev/null 2>&1; do
                sleep 2
              done
              echo "Secret exists. Waiting for required keys: ${KEYS}"
              for KEY in ${KEYS}; do
                # Bracket notation so hyphenated key names work. Dot notation
                # (kubectl's Go jsonpath) treats '-' as subtraction.
                until [ -n "$(kubectl get secret "${SECRET}" -n "${NS}" -o jsonpath="{.data['${KEY}']}")" ]; do
                  sleep 2
                done
                echo "  - ${KEY} populated"
              done
              echo "All required keys present. Proceeding."

