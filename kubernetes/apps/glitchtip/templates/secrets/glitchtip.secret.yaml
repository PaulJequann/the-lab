---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: glitchtip-secrets
  namespace: glitchtip
spec:
  encryptedData:
    DATABASE_URL: 
    DEFAULT_FROM_EMAIL: 
    EMAIL_URL: 
    GLITCHTIP_ADMIN_EMAIL: 
    GLITCHTIP_ADMIN_PASSWORD: 
    GLITCHTIP_ADMIN_USERNAME: 
    GLITCHTIP_BOOTSTRAP_MCP_TOKEN: 
    GLITCHTIP_BOOTSTRAP_MCP_TOKEN_LABEL: 
    GLITCHTIP_BOOTSTRAP_ORGANIZATION_NAME: 
    GLITCHTIP_BOOTSTRAP_ORGANIZATION_SLUG: 
    GLITCHTIP_BOOTSTRAP_PROJECT_KEY_NAME: 
    GLITCHTIP_BOOTSTRAP_PROJECT_KEY_PUBLIC_KEY: 
    GLITCHTIP_BOOTSTRAP_PROJECT_NAME: 
    GLITCHTIP_BOOTSTRAP_PROJECT_PLATFORM: 
    GLITCHTIP_BOOTSTRAP_PROJECT_SLUG: 
    MAINTENANCE_DATABASE_URL: 
    REDIS_URL: 
    SECRET_KEY: 
  template:
    metadata:
      annotations:
        argocd.argoproj.io/hook: PreSync
        argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
        argocd.argoproj.io/sync-wave: "-2"
      name: glitchtip-secrets
      namespace: glitchtip
    type: Opaque

