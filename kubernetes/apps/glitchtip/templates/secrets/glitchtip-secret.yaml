---
# The upstream glitchtip chart renders a Secret named "glitchtip" when
# valkey.enabled: true. ArgoCD treats this directory as plain manifests
# (not Helm), so the chart-generated Secret is never created. We provide
# it explicitly so the chart's REDIS_URL secretRef resolves.
apiVersion: v1
kind: Secret
metadata:
  name: glitchtip
  namespace: glitchtip
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
type: Opaque
data:
  REDIS_URL: cmVkaXM6Ly9nbGl0Y2h0aXAtdmFsa2V5OjYzNzkvMA==
