---
apiVersion: batch/v1
kind: Job
metadata:
  name: glitchtip-bootstrap-admin
  namespace: glitchtip
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: glitchtip-bootstrap-admin
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap-admin
          image: glitchtip/glitchtip:6.0.10
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: glitchtip-secrets
          env:
            - name: GLITCHTIP_BOOTSTRAP_MCP_TOKEN_LABEL
              value: "kashbot-mcp"
          command:
            - /bin/sh
            - -ec
            - |
              # Run migrations here because we disabled the chart's migrationJob
              # hook — it fires in PreSync before InfisicalSecret populates the
              # DB envvars. This PostSync hook runs after the Deployment (which
              # means the Secret is guaranteed present) and is safe to re-run.
              python manage.py migrate --noinput
              python manage.py shell <<'PY'
              import os

              from apps.api_tokens.models import APIToken
              from django.contrib.auth import get_user_model

              User = get_user_model()
              username = os.environ["ADMIN_USERNAME"]
              email = os.environ["ADMIN_EMAIL"]
              password = os.environ["ADMIN_PASSWORD"]
              token_label = os.environ["GLITCHTIP_BOOTSTRAP_MCP_TOKEN_LABEL"]
              token_value = os.environ["BOOTSTRAP_MCP_TOKEN"]
              desired_permissions = [
                  "project:read",
                  "project:write",
                  "project:admin",
                  "project:releases",
                  "team:read",
                  "team:write",
                  "team:admin",
                  "event:read",
                  "event:write",
                  "event:admin",
                  "org:read",
                  "org:write",
                  "org:admin",
                  "member:read",
                  "member:write",
                  "member:admin",
              ]

              user, _ = User.objects.get_or_create(
                  email=email,
                  defaults={
                      "name": username,
                      "is_staff": True,
                      "is_superuser": True,
                  },
              )
              user.name = username
              user.email = email
              user.is_staff = True
              user.is_superuser = True
              user.set_password(password)
              user.save()

              api_token, _ = APIToken.objects.get_or_create(
                  token=token_value,
                  defaults={
                      "user": user,
                      "label": token_label,
                  },
              )
              api_token_updates = []
              if api_token.user_id != user.id:
                  api_token.user = user
                  api_token_updates.append("user")
              if api_token.label != token_label:
                  api_token.label = token_label
                  api_token_updates.append("label")
              if api_token_updates:
                  api_token.save(update_fields=api_token_updates)
              # add_permissions is called unconditionally on every PostSync.
              # Behavior (set-union vs append) is not explicitly guarded here —
              # inspect APIToken model in the running glitchtip image before
              # assuming this is safely idempotent across long-running clusters.
              api_token.add_permissions(desired_permissions)

              print(f"bootstrap admin ready: {username}")
              print(f"bootstrap MCP token ready (label={token_label})")
              PY
