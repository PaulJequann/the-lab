---
glitchtip:
  image:
    repository: glitchtip/glitchtip
    tag: 6.0.10

  extraEnvVars:
    - name: EMAIL_URL
      valueFrom:
        secretKeyRef:
          name: glitchtip-secrets
          key: EMAIL_URL
    - name: DEFAULT_FROM_EMAIL
      value: "glitchtip@bysliek.com"
    - name: GLITCHTIP_ENABLE_MCP
      value: "true"
    - name: GLITCHTIP_ENABLE_LOGS
      value: "true"
    - name: GLITCHTIP_UPTIME_ALLOW_PRIVATE_IPS
      value: "true"
    - name: GLITCHTIP_RETENTION_DAYS
      value: "90"
    - name: GLITCHTIP_TRANSACTION_RETENTION_DAYS
      value: "30"
    - name: GLITCHTIP_LOG_RETENTION_DAYS
      value: "30"
    - name: GLITCHTIP_FILE_RETENTION_DAYS
      value: "30"
    - name: GLITCHTIP_ENABLE_DUCKDB
      value: "true"
    - name: GLITCHTIP_COLD_STORAGE_DIR
      value: "/var/lib/glitchtip/cold-storage"
    - name: DUCKDB_MEMORY_LIMIT
      value: "512MB"
    - name: DUCKDB_TEMP_DIRECTORY
      value: "/tmp"

  extraVolumes:
    - name: duckdb-cold-storage
      persistentVolumeClaim:
        claimName: glitchtip-duckdb

  extraVolumeMounts:
    - name: duckdb-cold-storage
      mountPath: /var/lib/glitchtip/cold-storage

  glitchtip:
    domain: "https://glitchtip.local.bysliek.com"
    existingSecret: glitchtip-secrets
    existingSecretKey: SECRET_KEY
    database:
      existingSecret: glitchtip-secrets
      existingSecretKey: DATABASE_URL
    maintenanceDatabase:
      existingSecret: glitchtip-secrets
      existingSecretKey: MAINTENANCE_DATABASE_URL
    valkey:
      existingSecret: glitchtip-secrets
      existingSecretKey: REDIS_URL

  # Chart's migrate Job annotates itself helm.sh/hook: post-install,pre-upgrade
  # which ArgoCD expands to PreSync+PostSync. The PreSync arm runs before the
  # InfisicalSecret populates glitchtip-secrets, so bootstrap/DR deadlocks on
  # CreateContainerConfigError. We run migrations inside the bootstrap-admin
  # Job (PostSync, after Secret+Deployment are in place) instead.
  migrationJob:
    enabled: false

  web:
    replicaCount: 1
    ingress:
      enabled: true
      className: cilium
      annotations:
        cert-manager.io/cluster-issuer: cloudflare-cluster-issuer
      hosts:
        - host: glitchtip.local.bysliek.com
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: glitchtip-tls
          hosts:
            - glitchtip.local.bysliek.com

  worker:
    enabled: true
    replicaCount: 1
    database:
      existingSecret: glitchtip-secrets
      existingSecretKey: MAINTENANCE_DATABASE_URL

  valkey:
    enabled: false

  postgresql:
    enabled: false

  tests:
    configuration:
      enabled: false
