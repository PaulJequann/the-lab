---
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: plane-secrets
  namespace: plane
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  labels:
    app.kubernetes.io/managed-by: infisical-operator
spec:
  hostAPI: http://infisical.infisical.svc.cluster.local:8080/api
  syncConfig:
    resyncInterval: 60s
  authentication:
    kubernetesAuth:
      identityId: 3faa50da-6467-4568-aa22-da12507306de
      autoCreateServiceAccountToken: true
      serviceAccountRef:
        name: infisical-opera-controller-manager
        namespace: infisical-operator
      secretsScope:
        projectSlug: the-lab-kjtq
        envSlug: prod
        secretsPath: /kubernetes/plane
        recursive: false
  managedKubeSecretReferences:
    - secretName: plane-app-secrets
      secretNamespace: plane
      secretType: Opaque
      creationPolicy: Owner
      template:
        includeAllSecrets: false
        data:
          SECRET_KEY: '{{ `{{ .SECRET_KEY.Value }}` }}'
          AES_SECRET_KEY: '{{ `{{ .AES_SECRET_KEY.Value }}` }}'
          LIVE_SERVER_SECRET_KEY: '{{ `{{ .LIVE_SERVER_SECRET_KEY.Value }}` }}'
          PI_INTERNAL_SECRET: '{{ `{{ .PI_INTERNAL_SECRET.Value }}` }}'
          DATABASE_URL: '{{ `postgresql://plane:{{ .POSTGRES_PASSWORD.Value }}@10.0.10.86:5432/plane` }}'
          REDIS_URL: redis://plane-app-redis.plane.svc.cluster.local:6379/
          AMQP_URL: '{{ `amqp://{{ .RABBITMQ_DEFAULT_USER.Value }}:{{ .RABBITMQ_DEFAULT_PASS.Value }}@plane-app-rabbitmq.plane.svc.cluster.local/` }}'
    - secretName: plane-live-secrets
      secretNamespace: plane
      secretType: Opaque
      creationPolicy: Owner
      template:
        includeAllSecrets: false
        data:
          LIVE_SERVER_SECRET_KEY: '{{ `{{ .LIVE_SERVER_SECRET_KEY.Value }}` }}'
          REDIS_URL: redis://plane-app-redis.plane.svc.cluster.local:6379/
    - secretName: plane-silo-secrets
      secretNamespace: plane
      secretType: Opaque
      creationPolicy: Owner
      template:
        includeAllSecrets: false
        data:
          SILO_HMAC_SECRET_KEY: '{{ `{{ .SILO_HMAC_SECRET_KEY.Value }}` }}'
          AES_SECRET_KEY: '{{ `{{ .AES_SECRET_KEY.Value }}` }}'
          DATABASE_URL: '{{ `postgresql://plane:{{ .POSTGRES_PASSWORD.Value }}@10.0.10.86:5432/plane` }}'
          REDIS_URL: redis://plane-app-redis.plane.svc.cluster.local:6379/
          AMQP_URL: '{{ `amqp://{{ .RABBITMQ_DEFAULT_USER.Value }}:{{ .RABBITMQ_DEFAULT_PASS.Value }}@plane-app-rabbitmq.plane.svc.cluster.local/` }}'
    - secretName: plane-rabbitmq-secrets
      secretNamespace: plane
      secretType: Opaque
      creationPolicy: Owner
      template:
        includeAllSecrets: false
        data:
          RABBITMQ_DEFAULT_USER: '{{ `{{ .RABBITMQ_DEFAULT_USER.Value }}` }}'
          RABBITMQ_DEFAULT_PASS: '{{ `{{ .RABBITMQ_DEFAULT_PASS.Value }}` }}'
---
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: plane-doc-store-secrets
  namespace: plane
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  labels:
    app.kubernetes.io/managed-by: infisical-operator
spec:
  hostAPI: http://infisical.infisical.svc.cluster.local:8080/api
  syncConfig:
    resyncInterval: 60s
  authentication:
    kubernetesAuth:
      identityId: 3faa50da-6467-4568-aa22-da12507306de
      autoCreateServiceAccountToken: true
      serviceAccountRef:
        name: infisical-opera-controller-manager
        namespace: infisical-operator
      secretsScope:
        projectSlug: the-lab-kjtq
        envSlug: prod
        secretsPath: /services-data/garage/plane
        recursive: false
  managedKubeSecretReferences:
    - secretName: plane-doc-store-secrets
      secretNamespace: plane
      secretType: Opaque
      creationPolicy: Owner
      template:
        includeAllSecrets: false
        data:
          FILE_SIZE_LIMIT: "5242880"
          AWS_S3_BUCKET_NAME: plane-uploads
          AWS_REGION: garage
          AWS_S3_ENDPOINT_URL: http://10.0.10.86:3900
          AWS_ACCESS_KEY_ID: '{{ `{{ .AWS_ACCESS_KEY_ID.Value }}` }}'
          AWS_SECRET_ACCESS_KEY: '{{ `{{ .AWS_SECRET_ACCESS_KEY.Value }}` }}'
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wait-for-plane-app-secrets
  namespace: plane
  annotations:
    argocd.argoproj.io/sync-wave: "-9"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: wait-for-plane-app-secrets
  namespace: plane
  annotations:
    argocd.argoproj.io/sync-wave: "-9"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["plane-app-secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: wait-for-plane-app-secrets
  namespace: plane
  annotations:
    argocd.argoproj.io/sync-wave: "-9"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: wait-for-plane-app-secrets
subjects:
  - kind: ServiceAccount
    name: wait-for-plane-app-secrets
    namespace: plane
---
apiVersion: batch/v1
kind: Job
metadata:
  name: wait-for-plane-app-secrets
  namespace: plane
  annotations:
    # Job runs in the wave AFTER its RBAC so SA/Role/RoleBinding are guaranteed
    # committed before the pod starts (avoids 403 Forbidden race).
    argocd.argoproj.io/sync-wave: "-8"
spec:
  # backoffLimit=2 tolerates transient pod failures (image-pull flakes,
  # first-boot Cilium policy enforcement hiccups) without blocking the sync.
  backoffLimit: 2
  activeDeadlineSeconds: 300
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wait-for-plane-app-secrets
    spec:
      serviceAccountName: wait-for-plane-app-secrets
      restartPolicy: Never
      containers:
        - name: wait
          # Bitnami migrated free images to bitnamilegacy/* in Aug 2025, so the
          # prior bitnami/kubectl:1.30.4 tag returns NotFound. bitnamilegacy is
          # the literal drop-in and preserves the minideb base (has /bin/sh for
          # this shell loop). rancher/kubectl would be the k3s-native choice
          # but ships distroless — no shell, breaks `command: [/bin/sh, -ec]`.
          image: bitnamilegacy/kubectl:1.30.4
          command:
            - /bin/sh
            - -ec
            - |
              SECRET="plane-app-secrets"
              NS="plane"
              KEYS="SECRET_KEY AES_SECRET_KEY LIVE_SERVER_SECRET_KEY PI_INTERNAL_SECRET DATABASE_URL REDIS_URL AMQP_URL"
              echo "Waiting for Secret ${NS}/${SECRET} to exist..."
              until kubectl get secret "${SECRET}" -n "${NS}" >/dev/null 2>&1; do
                sleep 2
              done
              echo "Secret exists. Waiting for required keys: ${KEYS}"
              for KEY in ${KEYS}; do
                # Bracket notation so hyphenated key names work. Dot notation
                # (kubectl's Go jsonpath) treats '-' as subtraction.
                until [ -n "$(kubectl get secret "${SECRET}" -n "${NS}" -o jsonpath="{.data['${KEY}']}")" ]; do
                  sleep 2
                done
                echo "  - ${KEY} populated"
              done
              echo "All required keys present. Proceeding."

