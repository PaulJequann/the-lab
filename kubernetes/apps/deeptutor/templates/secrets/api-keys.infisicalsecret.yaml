---
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: deeptutor-secrets
  namespace: deeptutor
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  labels:
    app.kubernetes.io/managed-by: infisical-operator
spec:
  hostAPI: http://infisical.infisical.svc.cluster.local:8080/api
  syncConfig:
    resyncInterval: 60s
  authentication:
    kubernetesAuth:
      identityId: 3faa50da-6467-4568-aa22-da12507306de
      autoCreateServiceAccountToken: true
      serviceAccountRef:
        name: infisical-opera-controller-manager
        namespace: infisical-operator
      secretsScope:
        projectSlug: the-lab-kjtq
        envSlug: prod
        secretsPath: /kubernetes/deeptutor
        recursive: false
  managedKubeSecretReferences:
    - secretName: deeptutor-secrets
      secretNamespace: deeptutor
      secretType: Opaque
      creationPolicy: Owner
      template:
        includeAllSecrets: true
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wait-for-deeptutor-secrets
  namespace: deeptutor
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: wait-for-deeptutor-secrets
  namespace: deeptutor
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["deeptutor-secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: wait-for-deeptutor-secrets
  namespace: deeptutor
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: wait-for-deeptutor-secrets
subjects:
  - kind: ServiceAccount
    name: wait-for-deeptutor-secrets
    namespace: deeptutor
---
apiVersion: batch/v1
kind: Job
metadata:
  name: wait-for-deeptutor-secrets
  namespace: deeptutor
  annotations:
    # Job runs in the wave AFTER its RBAC so SA/Role/RoleBinding are guaranteed
    # committed before the pod starts (avoids 403 Forbidden race).
    argocd.argoproj.io/sync-wave: "-4"
spec:
  # backoffLimit=2 tolerates transient pod failures (image-pull flakes,
  # first-boot Cilium policy enforcement hiccups) without blocking the sync.
  backoffLimit: 2
  activeDeadlineSeconds: 300
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wait-for-deeptutor-secrets
    spec:
      serviceAccountName: wait-for-deeptutor-secrets
      restartPolicy: Never
      containers:
        - name: wait
          # Bitnami migrated free images to bitnamilegacy/* in Aug 2025, so the
          # prior bitnami/kubectl:1.30.4 tag returns NotFound. bitnamilegacy is
          # the literal drop-in and preserves the minideb base (has /bin/sh for
          # this shell loop). rancher/kubectl would be the k3s-native choice
          # but ships distroless — no shell, breaks `command: [/bin/sh, -ec]`.
          image: bitnamilegacy/kubectl:1.30.4
          command:
            - /bin/sh
            - -ec
            - |
              SECRET="deeptutor-secrets"
              NS="deeptutor"
              KEYS="LLM_BINDING_API_KEY EMBEDDING_BINDING_API_KEY PERPLEXITY_API_KEY"
              echo "Waiting for Secret ${NS}/${SECRET} to exist..."
              until kubectl get secret "${SECRET}" -n "${NS}" >/dev/null 2>&1; do
                sleep 2
              done
              echo "Secret exists. Waiting for required keys: ${KEYS}"
              for KEY in ${KEYS}; do
                # Bracket notation so hyphenated key names work. Dot notation
                # (kubectl's Go jsonpath) treats '-' as subtraction.
                until [ -n "$(kubectl get secret "${SECRET}" -n "${NS}" -o jsonpath="{.data['${KEY}']}")" ]; do
                  sleep 2
                done
                echo "  - ${KEY} populated"
              done
              echo "All required keys present. Proceeding."

