---
version: "3"

vars:
  KUBERNETES_DIR: "{{.ROOT_DIR}}/kubernetes"
  ANSIBLE_DIR: "{{.ROOT_DIR}}/ansible"
  TERRAFORM_DIR: "{{.ROOT_DIR}}/terraform"

dotenv: [".config.env"]

env:
  KUBECONFIG: "{{.ROOT_DIR}}/kubeconfig"

includes:
  ansible: .taskfiles/AnsibleTasks.yml
  cluster: .taskfiles/ClusterTasks.yml
  precommit: .taskfiles/PrecommitTasks.yml
  terraform: .taskfiles/TerraformTasks.yml

tasks:
  init:
    desc: Initialize workstation dependencies
    cmds:
      - task: detect_os
      - task: install_deps

  detect_os:
    internal: true
    silent: true
    cmds:
      - |
        if command -v pacman &> /dev/null; then
          echo "export PKG_MANAGER=pacman" >> .pkg_manager
        elif command -v brew &> /dev/null; then
          echo "export PKG_MANAGER=brew" >> .pkg_manager
        else
          echo "No supported package manager found. Please install dependencies manually."
          exit 1
        fi

  install_deps:
    internal: true
    deps: [detect_os]
    cmds:
      - |
        source .pkg_manager
        if [ "$PKG_MANAGER" = "pacman" ]; then
          sudo pacman -Syu --needed {{.DEPS}} {{.CLI_ARGS}}
        elif [ "$PKG_MANAGER" = "brew" ]; then
          brew install {{.DEPS}} {{.CLI_ARGS}}
        fi
    vars:
      # macOS dependencies
      # fluxcd/tap/flux
      # go-task/tap/go-task
      # kubernetes-cli
      # weaveworks/tap/gitops
      # add weavework gitops later
      DEPS: >-
        age
        ansible
        direnv
        docker
        fluxcd
        task
        helm
        jq
        kubectl
        kustomize
        pre-commit
        prettier
        python-pip
        sops
        stern
        terraform
        tflint
        yamllint
        yq

  verify:
    desc: Verify env settings
    cmds:
      - ./configure --verify

  test:
    desc: Run local regression tests
    cmds:
      - task: scan-secrets
      - bash tests/load-bootstrap-secrets-test.sh
      - bash tests/infisical-task-split-test.sh
      - bash tests/fast-local-storage-test.sh
      - bash tests/services-data-phase3-test.sh
      - bash tests/services-data-phase4-test.sh
      - bash tests/secret-scan-gate-test.sh

  scan-secrets:
    desc: Scan staged changes for leaked secrets
    cmds:
      - infisical scan git-changes --staged --redact --no-color --exit-code 1

  migrate-fast-local-pvc:
    desc: Cold-copy app data from NFS PVCs to staged fast-local PVCs
    cmds:
      - bash scripts/migrate-fast-local-pvc.sh {{.CLI_ARGS}}

  # configure:
  #   desc: Configure repository from env settings
  #   cmds:
  #     - ./configure

  configure:
    desc: Configure repository from env settings
    cmds:
      - task: render-templates
      - task: download-cert-manager-crds
    sources:
      - config.yaml
      - templates/**/*.j2

  render-templates:
    desc: Render templates for Ansible and Terraform
    sources:
      - config.yaml
      - templates/**/*.j2
    generates:
      - "{{.ANSIBLE_DIR}}/**/*"
      - "{{.TERRAFORM_DIR}}/**/*"
      - "{{.KUBERNETES_DIR}}/**/*"
    cmds:
      - echo "Regenerating templates (sources changed)..."
      - python3 scripts/render.py --input ./templates/ansible --output {{.ANSIBLE_DIR}}
      - python3 scripts/render.py --input ./templates/terraform --output {{.TERRAFORM_DIR}}
      - python3 scripts/render.py --input ./templates/kubernetes --output {{.KUBERNETES_DIR}}
      - echo "Templates regenerated successfully"

  render-honcho-ansible:
    desc: Render only the Ansible files needed for Honcho configuration
    sources:
      - config.yaml
      - templates/ansible/group_vars/services.yaml.j2
      - templates/ansible/playbooks/honcho.yml.j2
      - templates/ansible/roles/honcho/**/*.j2
    generates:
      - "{{.ANSIBLE_DIR}}/group_vars/services.yaml"
      - "{{.ANSIBLE_DIR}}/playbooks/honcho.yml"
      - "{{.ANSIBLE_DIR}}/roles/honcho/**/*"
    cmds:
      - echo "Regenerating Honcho-related Ansible templates..."
      - python3 scripts/render.py --input ./templates/ansible/group_vars/services.yaml.j2 --output {{.ANSIBLE_DIR}}/group_vars
      - python3 scripts/render.py --input ./templates/ansible/playbooks/honcho.yml.j2 --output {{.ANSIBLE_DIR}}/playbooks
      - python3 scripts/render.py --input ./templates/ansible/roles/honcho --output {{.ANSIBLE_DIR}}/roles/honcho
      - echo "Honcho-related Ansible templates regenerated successfully"

  download-cert-manager-crds:
    desc: Download cert-manager CRDs for configured version
    cmds:
      - |
        VERSION="{{.CERT_MANAGER_VERSION}}"
        CRD_FILE="{{.KUBERNETES_DIR}}/core/cert-manager/manifests/cert-manager-crds.yaml"

        # Create directory if it doesn't exist
        mkdir -p "{{.KUBERNETES_DIR}}/core/cert-manager/manifests"

        # Check if file exists and get current version
        if [ -f "$CRD_FILE" ]; then
          CURRENT_VERSION=$(yq eval '.metadata.labels."app.kubernetes.io/version" | select(. != null)' "$CRD_FILE" | head -n1)

          if [ "$CURRENT_VERSION" = "$VERSION" ]; then
            echo "cert-manager CRDs version $VERSION already exists, skipping download"
            exit 0
          else
            echo "Current CRDs version: $CURRENT_VERSION"
            echo "Required version: $VERSION"
            echo "Updating cert-manager CRDs..."
          fi
        else
          echo "cert-manager CRDs file not found, downloading..."
        fi

        # Download CRDs for the specific version
        echo "Downloading cert-manager CRDs for version ${VERSION}..."
        curl -fsSL "https://github.com/cert-manager/cert-manager/releases/download/${VERSION}/cert-manager.crds.yaml" \
          -o "$CRD_FILE"

        echo "Downloaded cert-manager CRDs to kubernetes/core/cert-manager/cert-manager-crds.yaml"
    vars:
      CERT_MANAGER_VERSION:
        sh: yq eval '.cert_manager_chart_version' config.yaml
    preconditions:
      - test -f config.yaml
      - which curl
      - which yq

  deploy-glitchtip-data:
    desc: Render config, provision the GlitchTip data host, and configure PostgreSQL and Redis
    cmds:
      - task: configure
      - task: terraform:init-glitchtip-data
      - task: terraform:apply-glitchtip-data
      - task: ansible:bootstrap-glitchtip-data
      - task: ansible:configure-glitchtip-data
    preconditions:
      - sh: test "$(yq eval '.proxmox_api_url' config.yaml)" != "REPLACE_ME"
        msg: "Set proxmox_api_url in config.yaml"
      - sh: test "$(yq eval '.proxmox_api_token_id' config.yaml)" != "REPLACE_ME"
        msg: "Set proxmox_api_token_id in config.yaml"
      - sh: test "$(yq eval '.proxmox_lxc_template_name' config.yaml)" != "REPLACE_ME"
        msg: "Set proxmox_lxc_template_name in config.yaml"
      - sh: test -z "$(yq eval '.proxmox_lxc_template_name' config.yaml | grep '\.tmp\.')"
        msg: "proxmox_lxc_template_name must be the final Proxmox template volume, not a temporary .tmp download path"
      - sh: yq eval '.proxmox_lxc_template_name' config.yaml | grep -q ':vztmpl/'
        msg: "proxmox_lxc_template_name must look like <storage>:vztmpl/<template-file>.tar.zst"
      - sh: test "$(yq eval '.unifi_api_url' config.yaml)" != "REPLACE_ME"
        msg: "Set unifi_api_url in config.yaml"

  deploy-honcho:
    desc: Render config, provision the Honcho host, and configure Honcho, PostgreSQL, and Redis
    cmds:
      - task: configure
      - task: terraform:init-honcho
      - task: terraform:apply-honcho
      - task: ansible:bootstrap-honcho
      - task: ansible:configure-honcho
    preconditions:
      - sh: test "$(yq eval '.proxmox_api_url' config.yaml)" != "REPLACE_ME"
        msg: "Set proxmox_api_url in config.yaml"
      - sh: test "$(yq eval '.proxmox_api_token_id' config.yaml)" != "REPLACE_ME"
        msg: "Set proxmox_api_token_id in config.yaml"
      - sh: test "$(yq eval '.proxmox_lxc_template_name' config.yaml)" != "REPLACE_ME"
        msg: "Set proxmox_lxc_template_name in config.yaml"
      - sh: test -z "$(yq eval '.proxmox_lxc_template_name' config.yaml | grep '\.tmp\.')"
        msg: "proxmox_lxc_template_name must be the final Proxmox template volume, not a temporary .tmp download path"
      - sh: yq eval '.proxmox_lxc_template_name' config.yaml | grep -q ':vztmpl/'
        msg: "proxmox_lxc_template_name must look like <storage>:vztmpl/<template-file>.tar.zst"
      - sh: test "$(yq eval '.unifi_api_url' config.yaml)" != "REPLACE_ME"
        msg: "Set unifi_api_url in config.yaml"

  deploy-infisical-data:
    desc: Deploy the Infisical data host and create K8s bootstrap secrets
    cmds:
      - |
        source scripts/load-bootstrap-secrets.sh all
        task configure && \
        task terraform:init-infisical-data && \
        task terraform:apply-infisical-data && \
        task ansible:bootstrap-infisical-data && \
        task ansible:configure-infisical-data && \
        task redeploy-infisical-secrets
    preconditions:
      - sh: command -v rbw >/dev/null 2>&1
        msg: "rbw must be installed on the host workstation."
      - sh: RBW_PROFILE=bootstrap rbw config show >/dev/null 2>&1
        msg: "rbw bootstrap profile is not configured. Configure RBW_PROFILE=bootstrap first."
      - sh: command -v kubectl >/dev/null 2>&1
        msg: "kubectl must be installed."
      - sh: kubectl cluster-info >/dev/null 2>&1
        msg: "kubectl cannot reach the current cluster. Fix kubeconfig or cluster access before running deploy-infisical-data."
      - sh: yq --version 2>/dev/null | grep -q '^yq (https://github.com/mikefarah/yq/) version v4\.'
        msg: "deploy-infisical-data requires Mike Farah yq v4. Install the system package: go-yq."
      - sh: test "$(yq eval '.proxmox_api_url' config.yaml)" != "REPLACE_ME"
        msg: "Set proxmox_api_url in config.yaml"
      - sh: test "$(yq eval '.proxmox_api_token_id' config.yaml)" != "REPLACE_ME"
        msg: "Set proxmox_api_token_id in config.yaml"
      - sh: test "$(yq eval '.proxmox_lxc_template_name' config.yaml)" != "REPLACE_ME"
        msg: "Set proxmox_lxc_template_name in config.yaml"
      - sh: test -z "$(yq eval '.proxmox_lxc_template_name' config.yaml | grep '\.tmp\.')"
        msg: "proxmox_lxc_template_name must be the final Proxmox template volume, not a temporary .tmp download path"
      - sh: yq eval '.proxmox_lxc_template_name' config.yaml | grep -q ':vztmpl/'
        msg: "proxmox_lxc_template_name must look like <storage>:vztmpl/<template-file>.tar.zst"
      - sh: test "$(yq eval '.unifi_api_url' config.yaml)" != "REPLACE_ME"
        msg: "Set unifi_api_url in config.yaml"

  update-infisical-data:
    desc: Update the Infisical data host without reprovisioning it
    cmds:
      - |
        source scripts/load-bootstrap-secrets.sh infisical
        task ansible:update-infisical-data && \
        task ansible:configure-infisical-data
    preconditions:
      - sh: command -v rbw >/dev/null 2>&1
        msg: "rbw must be installed on the host workstation."
      - sh: RBW_PROFILE=bootstrap rbw config show >/dev/null 2>&1
        msg: "rbw bootstrap profile is not configured. Configure RBW_PROFILE=bootstrap first."

  redeploy-infisical-secrets:
    desc: Rotate Infisical credentials on the data host and in the Kubernetes bootstrap Secret
    cmds:
      - |
        source scripts/load-bootstrap-secrets.sh infisical
        task ansible:configure-infisical-data
      - task: apply-infisical-bootstrap-secrets
      - kubectl -n infisical rollout restart deployment/infisical 2>/dev/null || true
    preconditions:
      - sh: command -v rbw >/dev/null 2>&1
        msg: "rbw must be installed on the host workstation."
      - sh: RBW_PROFILE=bootstrap rbw config show >/dev/null 2>&1
        msg: "rbw bootstrap profile is not configured. Configure RBW_PROFILE=bootstrap first."
      - sh: command -v kubectl >/dev/null 2>&1
        msg: "kubectl must be installed."
      - sh: kubectl cluster-info >/dev/null 2>&1
        msg: "kubectl cannot reach the current cluster. Fix kubeconfig or cluster access before running redeploy-infisical-secrets."
      - sh: yq --version 2>/dev/null | grep -q '^yq (https://github.com/mikefarah/yq/) version v4\.'
        msg: "redeploy-infisical-secrets requires Mike Farah yq v4. Install the system package: go-yq."

  apply-infisical-bootstrap-secrets:
    internal: true
    desc: Create or reconcile the Kubernetes namespace and bootstrap secrets for Infisical
    vars:
      INFISICAL_NS: infisical
      INFISICAL_BOOTSTRAP_HOST:
        sh: yq eval '.terraform_service_lxcs."services-data".ip' config.yaml
      INFISICAL_BOOTSTRAP_ROLLBACK_HOST:
        sh: yq eval '.terraform_service_lxcs."infisical-data".ip' config.yaml
    env:
      INFISICAL_DB_PASSWORD:
        sh: RBW_PROFILE=bootstrap rbw get homelab/bootstrap/infisical-db-password
      INFISICAL_REDIS_PASSWORD:
        sh: RBW_PROFILE=bootstrap rbw get homelab/bootstrap/infisical-redis-password
      INFISICAL_ENCRYPTION_KEY:
        sh: RBW_PROFILE=bootstrap rbw get homelab/bootstrap/infisical-encryption-key
      INFISICAL_AUTH_SECRET:
        sh: RBW_PROFILE=bootstrap rbw get homelab/bootstrap/infisical-auth-secret
    preconditions:
      - sh: command -v python3 >/dev/null 2>&1
        msg: "python3 required for URL-encoding secret passwords."
      - sh: yq --version 2>/dev/null | grep -q '^yq (https://github.com/mikefarah/yq/) version v4\.'
        msg: "apply-infisical-bootstrap-secrets requires Mike Farah yq v4. Install the system package: go-yq."
    cmds:
      - kubectl create namespace {{.INFISICAL_NS}} --dry-run=client -o yaml | kubectl apply -f -
      - |
        DB_PW_ENC=$(python3 -c 'import os, urllib.parse; print(urllib.parse.quote(os.environ["INFISICAL_DB_PASSWORD"], safe=""))')
        REDIS_PW_ENC=$(python3 -c 'import os, urllib.parse; print(urllib.parse.quote(os.environ["INFISICAL_REDIS_PASSWORD"], safe=""))')
        echo "Composing Infisical bootstrap Secrets for {{.INFISICAL_BOOTSTRAP_HOST}} (rollback host: {{.INFISICAL_BOOTSTRAP_ROLLBACK_HOST}})"
        kubectl create secret generic infisical-secrets \
          --namespace={{.INFISICAL_NS}} \
          --from-literal="ENCRYPTION_KEY=${INFISICAL_ENCRYPTION_KEY}" \
          --from-literal="AUTH_SECRET=${INFISICAL_AUTH_SECRET}" \
          --from-literal="REDIS_URL=redis://:${REDIS_PW_ENC}@{{.INFISICAL_BOOTSTRAP_HOST}}:6379" \
          --from-literal="SITE_URL=https://infisical.local.bysliek.com" \
          --dry-run=client -o yaml | kubectl apply -f -
        kubectl create secret generic infisical-postgres-connection \
          --namespace={{.INFISICAL_NS}} \
          --from-literal="connectionString=postgresql://infisical:${DB_PW_ENC}@{{.INFISICAL_BOOTSTRAP_HOST}}:5432/infisical?sslmode=disable" \
          --dry-run=client -o yaml | kubectl apply -f -

  deploy-infisical-app:
    desc: Render, verify, and drive ArgoCD to sync the Infisical K8s application
    vars:
      INFISICAL_NS: infisical
      INFISICAL_DOMAIN: infisical.local.bysliek.com
      INFISICAL_CHART_DIR: "{{.KUBERNETES_DIR}}/infrastructure/infisical"
      ARGOCD_NS: argocd
    preconditions:
      - sh: command -v kubectl >/dev/null 2>&1
        msg: "kubectl must be installed."
      - sh: kubectl cluster-info >/dev/null 2>&1
        msg: "kubectl cannot reach the current cluster. Fix kubeconfig or cluster access before running deploy-infisical-app."
      - sh: command -v helm >/dev/null 2>&1
        msg: "helm must be installed for dry-render verification."
      - sh: kubectl -n {{.INFISICAL_NS}} get secret infisical-secrets >/dev/null 2>&1
        msg: "infisical-secrets bootstrap Secret not found in {{.INFISICAL_NS}} namespace. Run: task redeploy-infisical-secrets"
      - sh: kubectl -n {{.INFISICAL_NS}} get secret infisical-postgres-connection >/dev/null 2>&1
        msg: "infisical-postgres-connection bootstrap Secret not found in {{.INFISICAL_NS}} namespace. Run: task redeploy-infisical-secrets"
      - sh: test -f {{.INFISICAL_CHART_DIR}}/Chart.yaml
        msg: "{{.INFISICAL_CHART_DIR}}/Chart.yaml missing. Run: task configure"
      - sh: test -f {{.INFISICAL_CHART_DIR}}/values.yaml
        msg: "{{.INFISICAL_CHART_DIR}}/values.yaml missing. Run: task configure"
    cmds:
      - task: configure
      - helm dependency build {{.INFISICAL_CHART_DIR}}
      - helm template infisical {{.INFISICAL_CHART_DIR}} >/dev/null
      - |
        if ! kubectl -n {{.ARGOCD_NS}} get application infisical >/dev/null 2>&1; then
          echo "ArgoCD Application 'infisical' does not exist yet."
          echo "Commit and push kubernetes/infrastructure/infisical/ so the cluster-apps ApplicationSet creates it, then re-run this task."
          exit 1
        fi
      - kubectl -n {{.ARGOCD_NS}} annotate application infisical argocd.argoproj.io/refresh=normal --overwrite
      - |
        echo "Waiting for Infisical Deployment to become Available (up to 5m)..."
        kubectl -n {{.INFISICAL_NS}} wait --for=condition=Available deployment --all --timeout=5m
      - |
        echo "Probing https://{{.INFISICAL_DOMAIN}}/api/status..."
        status=$(curl -sk -o /dev/null -w "%{http_code}" https://{{.INFISICAL_DOMAIN}}/api/status || echo "000")
        if [ "$status" != "200" ]; then
          echo "API status check failed: HTTP $status"
          echo "Check: kubectl -n {{.INFISICAL_NS}} get pods,ingress,certificate"
          exit 1
        fi
        echo "API OK (HTTP 200)"
      - |
        echo ""
        echo "A.4 done gate:"
        echo "  [x] bootstrap Secrets present in {{.INFISICAL_NS}}"
        echo "  [x] ArgoCD Application exists and refresh triggered"
        echo "  [x] Deployment Available (pods Ready)"
        echo "  [x] https://{{.INFISICAL_DOMAIN}}/api/status returned 200"
        echo ""
        echo "Manual follow-up before closing A.4:"
        echo "  - Verify ArgoCD app health: kubectl -n {{.ARGOCD_NS}} get application infisical"
        echo "  - Verify TLS cert issued (not self-signed): kubectl -n {{.INFISICAL_NS}} get certificate infisical-tls"
        echo "  - Sign up root admin at https://{{.INFISICAL_DOMAIN}}/"
        echo "  - Save credentials to Bitwarden: homelab/infisical/admin-email + homelab/infisical/admin-password"

  deploy-services-data:
    desc: Provision the services-data LXC and configure empty PG17 + Redis (Phase 1)
    cmds:
      - |
        source scripts/load-bootstrap-secrets.sh all
        task configure && \
        task terraform:init-services-data && \
        task terraform:apply-services-data && \
        task ansible:bootstrap-services-data && \
        task ansible:configure-services-data
    preconditions:
      - sh: command -v rbw >/dev/null 2>&1
        msg: "rbw must be installed on the host workstation."
      - sh: RBW_PROFILE=bootstrap rbw config show >/dev/null 2>&1
        msg: "rbw bootstrap profile is not configured. Configure RBW_PROFILE=bootstrap first."
      - sh: test "$(yq eval '.proxmox_api_url' config.yaml)" != "REPLACE_ME"
        msg: "Set proxmox_api_url in config.yaml"
      - sh: test "$(yq eval '.proxmox_api_token_id' config.yaml)" != "REPLACE_ME"
        msg: "Set proxmox_api_token_id in config.yaml"
      - sh: test "$(yq eval '.proxmox_lxc_template_name' config.yaml)" != "REPLACE_ME"
        msg: "Set proxmox_lxc_template_name in config.yaml"
      - sh: test -z "$(yq eval '.proxmox_lxc_template_name' config.yaml | grep '\.tmp\.')"
        msg: "proxmox_lxc_template_name must be the final Proxmox template volume, not a temporary .tmp download path"
      - sh: yq eval '.proxmox_lxc_template_name' config.yaml | grep -q ':vztmpl/'
        msg: "proxmox_lxc_template_name must look like <storage>:vztmpl/<template-file>.tar.zst"
      - sh: test "$(yq eval '.unifi_api_url' config.yaml)" != "REPLACE_ME"
        msg: "Set unifi_api_url in config.yaml"

  phase3-infisical-rehearsal:
    desc: Restore Infisical into services-data and deploy a scratch Infisical release
    silent: true
    vars:
      INFISICAL_DATA_IP: 10.0.10.85
      SERVICES_DATA_IP: 10.0.10.86
      INFISICAL_REHEARSAL_NS: infisical-rehearsal
      INFISICAL_CHART_DIR: "{{.KUBERNETES_DIR}}/infrastructure/infisical"
    cmds:
      - |
        set -euo pipefail

        source scripts/load-bootstrap-secrets.sh ansible infisical

        echo "Removing any stale services-data Infisical rehearsal DB before role convergence..."
        ssh pj@{{.SERVICES_DATA_IP}} "sudo -n -u postgres psql -v ON_ERROR_STOP=1 -d postgres -c \"SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname = 'infisical';\" && sudo -n -u postgres dropdb --if-exists infisical"

        task configure
        task ansible:configure-services-data

        echo "Resetting scratch namespace and restoring a fresh Infisical dump into services-data..."
        kubectl delete namespace {{.INFISICAL_REHEARSAL_NS}} --ignore-not-found --wait=true

        DUMP_FILE="$(mktemp -t infisical-rehearsal.XXXXXX.dump)"
        trap 'rm -f "${DUMP_FILE}"' EXIT

        ssh pj@{{.INFISICAL_DATA_IP}} "sudo -n -u postgres pg_dump -Fc -d infisical" > "${DUMP_FILE}"

        ssh pj@{{.SERVICES_DATA_IP}} "sudo -n -u postgres psql -v ON_ERROR_STOP=1 -d postgres -c \"SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname = 'infisical';\" && sudo -n -u postgres dropdb --if-exists infisical && sudo -n -u postgres createdb -O infisical --encoding=UTF8 --template=template0 --lc-collate=C.UTF-8 --lc-ctype=C.UTF-8 infisical"
        scp "${DUMP_FILE}" pj@{{.SERVICES_DATA_IP}}:/tmp/infisical-rehearsal.dump
        ssh pj@{{.SERVICES_DATA_IP}} "chmod 0644 /tmp/infisical-rehearsal.dump && sudo -n -u postgres pg_restore --no-owner --role=infisical -d infisical /tmp/infisical-rehearsal.dump && rm -f /tmp/infisical-rehearsal.dump"

        kubectl create namespace {{.INFISICAL_REHEARSAL_NS}} --dry-run=client -o yaml | kubectl apply -f -

        DB_PW_ENC=$(python3 -c 'import os, urllib.parse; print(urllib.parse.quote(os.environ["INFISICAL_DB_PASSWORD"], safe=""))')
        REDIS_PW_ENC=$(python3 -c 'import os, urllib.parse; print(urllib.parse.quote(os.environ["INFISICAL_REDIS_PASSWORD"], safe=""))')

        kubectl create secret generic infisical-secrets \
          --namespace={{.INFISICAL_REHEARSAL_NS}} \
          --from-literal="ENCRYPTION_KEY=${INFISICAL_ENCRYPTION_KEY}" \
          --from-literal="AUTH_SECRET=${INFISICAL_AUTH_SECRET}" \
          --from-literal="REDIS_URL=redis://:${REDIS_PW_ENC}@{{.SERVICES_DATA_IP}}:6379" \
          --from-literal="SITE_URL=http://localhost:8080" \
          --dry-run=client -o yaml | kubectl apply -f -

        kubectl create secret generic infisical-postgres-connection \
          --namespace={{.INFISICAL_REHEARSAL_NS}} \
          --from-literal="connectionString=postgresql://infisical:${DB_PW_ENC}@{{.SERVICES_DATA_IP}}:5432/infisical?sslmode=disable" \
          --dry-run=client -o yaml | kubectl apply -f -

        helm dependency build "{{.INFISICAL_CHART_DIR}}"
        helm upgrade --install infisical-rehearsal "{{.INFISICAL_CHART_DIR}}" \
          --namespace {{.INFISICAL_REHEARSAL_NS}} \
          --set infisical-standalone.ingress.enabled=false \
          --set infisical-standalone.infisical.kubeSecretRef=infisical-secrets \
          --set infisical-standalone.infisical.replicaCount=1 \
          --set infisical-standalone.postgresql.enabled=false \
          --set infisical-standalone.postgresql.useExistingPostgresSecret.enabled=true \
          --set infisical-standalone.postgresql.useExistingPostgresSecret.existingConnectionStringSecret.name=infisical-postgres-connection \
          --set infisical-standalone.postgresql.useExistingPostgresSecret.existingConnectionStringSecret.key=connectionString \
          --set infisical-standalone.redis.enabled=false \
          --set tokenReviewer.enabled=false

        kubectl -n {{.INFISICAL_REHEARSAL_NS}} rollout status deployment/infisical --timeout=5m

        echo ""
        echo "Phase 3 rehearsal is deployed in namespace {{.INFISICAL_REHEARSAL_NS}}."
        echo "Verify decryption and API behavior, then run: task phase3-infisical-rehearsal-cleanup"
        echo "Useful checks:"
        echo "  kubectl -n {{.INFISICAL_REHEARSAL_NS}} logs deployment/infisical --tail=100"
        echo "  kubectl -n {{.INFISICAL_REHEARSAL_NS}} port-forward svc/infisical 8080:8080"
    preconditions:
      - sh: command -v rbw >/dev/null 2>&1
        msg: "rbw must be installed on the host workstation."
      - sh: RBW_PROFILE=bootstrap rbw config show >/dev/null 2>&1
        msg: "rbw bootstrap profile is not configured. Configure RBW_PROFILE=bootstrap first."
      - sh: command -v kubectl >/dev/null 2>&1
        msg: "kubectl must be installed."
      - sh: kubectl cluster-info >/dev/null 2>&1
        msg: "kubectl cannot reach the current cluster. Fix kubeconfig or cluster access before running phase3-infisical-rehearsal."
      - sh: command -v helm >/dev/null 2>&1
        msg: "helm must be installed."
      - sh: command -v ssh >/dev/null 2>&1
        msg: "ssh must be installed."
      - sh: command -v scp >/dev/null 2>&1
        msg: "scp must be installed."
      - sh: command -v python3 >/dev/null 2>&1
        msg: "python3 is required for URL-encoding secret passwords."
      - sh: test "$(yq eval '.terraform_service_lxcs."services-data".enable_infisical_db' config.yaml)" = "true"
        msg: "Set terraform_service_lxcs.services-data.enable_infisical_db=true in config.yaml before Phase 3."
      - sh: ip route get {{.INFISICAL_DATA_IP}} >/dev/null 2>&1
        msg: "No local route to infisical-data at {{.INFISICAL_DATA_IP}}."
      - sh: ip route get {{.SERVICES_DATA_IP}} >/dev/null 2>&1
        msg: "No local route to services-data at {{.SERVICES_DATA_IP}}."

  phase3-infisical-rehearsal-cleanup:
    desc: Remove scratch Infisical rehearsal deployment and empty the services-data Infisical DB
    silent: true
    vars:
      SERVICES_DATA_IP: 10.0.10.86
      INFISICAL_REHEARSAL_NS: infisical-rehearsal
    cmds:
      - |
        set -euo pipefail

        helm uninstall infisical-rehearsal --namespace {{.INFISICAL_REHEARSAL_NS}} --ignore-not-found || true
        kubectl delete namespace {{.INFISICAL_REHEARSAL_NS}} --ignore-not-found --wait=true

        ssh pj@{{.SERVICES_DATA_IP}} "sudo -n -u postgres psql -v ON_ERROR_STOP=1 -d postgres -c \"SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname = 'infisical';\" && sudo -n -u postgres dropdb --if-exists infisical && sudo -n -u postgres createdb -O infisical --encoding=UTF8 --template=template0 --lc-collate=C.UTF-8 --lc-ctype=C.UTF-8 infisical"
    preconditions:
      - sh: command -v kubectl >/dev/null 2>&1
        msg: "kubectl must be installed."
      - sh: command -v helm >/dev/null 2>&1
        msg: "helm must be installed."
      - sh: command -v ssh >/dev/null 2>&1
        msg: "ssh must be installed."
      - sh: ip route get {{.SERVICES_DATA_IP}} >/dev/null 2>&1
        msg: "No local route to services-data at {{.SERVICES_DATA_IP}}."

  reconfigure-honcho:
    desc: Re-render Honcho Ansible templates and reapply Honcho runtime configuration
    preconditions:
      - sh: ip route get "$(yq eval '.honcho_ip' config.yaml)" >/dev/null 2>&1
        msg: "No local route to honcho_ip from this environment"
      - sh: bash -lc 'ip="$(yq eval ".honcho_ip" config.yaml)"; exec 3<>/dev/tcp/${ip}/22'
        msg: "Cannot reach Honcho SSH on honcho_ip. Run task deploy-honcho first, or verify the LXC is up and reachable."
    cmds:
      - task: render-honcho-ansible
      - task: ansible:reconfigure-honcho-runtime
