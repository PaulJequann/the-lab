---
version: "3"

vars:
  KUBERNETES_DIR: "{{.ROOT_DIR}}/kubernetes"
  ANSIBLE_DIR: "{{.ROOT_DIR}}/ansible"
  TERRAFORM_DIR: "{{.ROOT_DIR}}/terraform"

dotenv: [".config.env"]

env:
  KUBECONFIG: "{{.ROOT_DIR}}/kubeconfig"
  SOPS_AGE_KEY_FILE: ~/.config/sops/age/keys.txt

includes:
  ansible: .taskfiles/AnsibleTasks.yml
  cluster: .taskfiles/ClusterTasks.yml
  precommit: .taskfiles/PrecommitTasks.yml
  terraform: .taskfiles/TerraformTasks.yml
  secrets: .taskfiles/SecretTasks.yaml

tasks:
  init:
    desc: Initialize workstation dependencies
    cmds:
      - task: detect_os
      - task: install_deps

  detect_os:
    internal: true
    silent: true
    cmds:
      - |
        if command -v pacman &> /dev/null; then
          echo "export PKG_MANAGER=pacman" >> .pkg_manager
        elif command -v brew &> /dev/null; then
          echo "export PKG_MANAGER=brew" >> .pkg_manager
        else
          echo "No supported package manager found. Please install dependencies manually."
          exit 1
        fi

  install_deps:
    internal: true
    deps: [detect_os]
    cmds:
      - |
        source .pkg_manager
        if [ "$PKG_MANAGER" = "pacman" ]; then
          sudo pacman -Syu --needed {{.DEPS}} {{.CLI_ARGS}}
        elif [ "$PKG_MANAGER" = "brew" ]; then
          brew install {{.DEPS}} {{.CLI_ARGS}}
        fi
    vars:
      # macOS dependencies
      # fluxcd/tap/flux
      # go-task/tap/go-task
      # kubernetes-cli
      # weaveworks/tap/gitops
      # add weavework gitops later
      DEPS: >-
        age
        ansible
        direnv
        docker
        fluxcd
        task
        helm
        jq
        kubectl
        kustomize
        pre-commit
        prettier
        python-pip
        sops
        stern
        terraform
        tflint
        yamllint
        yq

  verify:
    desc: Verify env settings
    cmds:
      - ./configure --verify

  test:
    desc: Run local regression tests
    cmds:
      - bash tests/load-bootstrap-secrets-test.sh

  # configure:
  #   desc: Configure repository from env settings
  #   cmds:
  #     - ./configure

  configure:
    desc: Configure repository from env settings
    cmds:
      - task: render-templates
      - task: encrypt-secrets
      - task: download-cert-manager-crds
    sources:
      - config.yaml
      - templates/**/*.j2

  render-templates:
    desc: Render templates for Ansible and Terraform
    sources:
      - config.yaml
      - templates/**/*.j2
    generates:
      - "{{.ANSIBLE_DIR}}/**/*"
      - "{{.TERRAFORM_DIR}}/**/*"
      - "{{.KUBERNETES_DIR}}/**/*"
    cmds:
      - echo "Regenerating templates (sources changed)..."
      - makejinja --input ./templates/ansible/ --output {{.ANSIBLE_DIR}}
      - makejinja --input ./templates/terraform/ --output {{.TERRAFORM_DIR}}/
      - makejinja --input ./templates/kubernetes/ --output {{.KUBERNETES_DIR}}
      - echo "Templates regenerated successfully"

  render-honcho-ansible:
    desc: Render only the Ansible files needed for Honcho configuration
    sources:
      - config.yaml
      - templates/ansible/group_vars/services.yaml.j2
      - templates/ansible/playbooks/honcho.yml.j2
      - templates/ansible/roles/honcho/**/*.j2
    generates:
      - "{{.ANSIBLE_DIR}}/group_vars/services.yaml"
      - "{{.ANSIBLE_DIR}}/playbooks/honcho.yml"
      - "{{.ANSIBLE_DIR}}/roles/honcho/**/*"
    cmds:
      - echo "Regenerating Honcho-related Ansible templates..."
      - makejinja --input ./templates/ansible/group_vars/services.yaml.j2 --output {{.ANSIBLE_DIR}}/group_vars
      - makejinja --input ./templates/ansible/playbooks/honcho.yml.j2 --output {{.ANSIBLE_DIR}}/playbooks
      - makejinja --input ./templates/ansible/roles/honcho/ --output {{.ANSIBLE_DIR}}/roles/honcho
      - echo "Honcho-related Ansible templates regenerated successfully"

  encrypt-secrets:
    cmds:
      - for: { var: SECRET_FILES }
        cmd: |
          # Check if file is currently encrypted
          if sops filestatus "{{.ITEM}}" | jq --exit-status ".encrypted" &>/dev/null; then
            echo "Skipping {{.ITEM}} - already encrypted"
          else
            # File is plaintext - check if we have a backup to compare against
            BACKUP_FILE="{{.ITEM}}.encrypted.bak"
            CHECKSUM_FILE="{{.ITEM}}.checksum"

            if [ -f "$BACKUP_FILE" ] && [ -f "$CHECKSUM_FILE" ]; then
              # Compare checksum of current plaintext with stored checksum
              CURRENT_CHECKSUM=$(sha256sum "{{.ITEM}}" | awk '{print $1}')
              STORED_CHECKSUM=$(cat "$CHECKSUM_FILE")

              if [ "$CURRENT_CHECKSUM" = "$STORED_CHECKSUM" ]; then
                echo "Restoring {{.ITEM}} from backup - content unchanged"
                cp "$BACKUP_FILE" "{{.ITEM}}"
              else
                echo "Encrypting {{.ITEM}} - content changed"
                sops --encrypt --in-place "{{.ITEM}}"
                cp "{{.ITEM}}" "$BACKUP_FILE"
                echo "$CURRENT_CHECKSUM" > "$CHECKSUM_FILE"
              fi
            else
              echo "Encrypting {{.ITEM}} - first time"
              CURRENT_CHECKSUM=$(sha256sum "{{.ITEM}}" | awk '{print $1}')
              sops --encrypt --in-place "{{.ITEM}}"
              cp "{{.ITEM}}" "$BACKUP_FILE"
              echo "$CURRENT_CHECKSUM" > "$CHECKSUM_FILE"
            fi
          fi

  # encrypt-secrets:
  #   cmds:
  #     - for: { var: SECRET_FILES }
  #       cmd: |
  #         if sops filestatus "{{.ITEM}}" | jq --exit-status ".encrypted == false" &>/dev/null; then
  #               sops --encrypt --in-place "{{.ITEM}}"
  #         fi
    vars:
      SECRET_FILES:
        sh: find "{{.ANSIBLE_DIR}}" "{{.TERRAFORM_DIR}}" "{{.KUBERNETES_DIR}}" -type f -name "*.sops.*" ! -name "*.encrypted.bak" ! -name "*.checksum" -print
    preconditions:
      - test -f {{.SOPS_AGE_KEY_FILE}}
      - test -f {{.ROOT_DIR}}/.sops.yaml
      - which jq sops

  download-cert-manager-crds:
    desc: Download cert-manager CRDs for configured version
    cmds:
      - |
        VERSION="{{.CERT_MANAGER_VERSION}}"
        CRD_FILE="{{.KUBERNETES_DIR}}/core/cert-manager/manifests/cert-manager-crds.yaml"

        # Create directory if it doesn't exist
        mkdir -p "{{.KUBERNETES_DIR}}/core/cert-manager/manifests"

        # Check if file exists and get current version
        if [ -f "$CRD_FILE" ]; then
          CURRENT_VERSION=$(yq eval '.metadata.labels."app.kubernetes.io/version" | select(. != null)' "$CRD_FILE" | head -n1)

          if [ "$CURRENT_VERSION" = "$VERSION" ]; then
            echo "cert-manager CRDs version $VERSION already exists, skipping download"
            exit 0
          else
            echo "Current CRDs version: $CURRENT_VERSION"
            echo "Required version: $VERSION"
            echo "Updating cert-manager CRDs..."
          fi
        else
          echo "cert-manager CRDs file not found, downloading..."
        fi

        # Download CRDs for the specific version
        echo "Downloading cert-manager CRDs for version ${VERSION}..."
        curl -fsSL "https://github.com/cert-manager/cert-manager/releases/download/${VERSION}/cert-manager.crds.yaml" \
          -o "$CRD_FILE"

        echo "Downloaded cert-manager CRDs to kubernetes/core/cert-manager/cert-manager-crds.yaml"
    vars:
      CERT_MANAGER_VERSION:
        sh: yq eval '.cert_manager_chart_version' config.yaml
    preconditions:
      - test -f config.yaml
      - which curl
      - which yq

  deploy-glitchtip-data:
    desc: Render config, provision the GlitchTip data host, and configure PostgreSQL and Redis
    cmds:
      - task: configure
      - task: terraform:init-glitchtip-data
      - task: terraform:apply-glitchtip-data
      - task: ansible:bootstrap-glitchtip-data
      - task: ansible:configure-glitchtip-data
    preconditions:
      - sh: test "$(yq eval '.proxmox_api_url' config.yaml)" != "REPLACE_ME"
        msg: "Set proxmox_api_url in config.yaml"
      - sh: test "$(yq eval '.proxmox_api_token_id' config.yaml)" != "REPLACE_ME"
        msg: "Set proxmox_api_token_id in config.yaml"
      - sh: test "$(yq eval '.proxmox_lxc_template_name' config.yaml)" != "REPLACE_ME"
        msg: "Set proxmox_lxc_template_name in config.yaml"
      - sh: test -z "$(yq eval '.proxmox_lxc_template_name' config.yaml | grep '\.tmp\.')"
        msg: "proxmox_lxc_template_name must be the final Proxmox template volume, not a temporary .tmp download path"
      - sh: yq eval '.proxmox_lxc_template_name' config.yaml | grep -q ':vztmpl/'
        msg: "proxmox_lxc_template_name must look like <storage>:vztmpl/<template-file>.tar.zst"
      - sh: test "$(yq eval '.proxmox_api_token_secret' config.yaml)" != "REPLACE_ME"
        msg: "Set proxmox_api_token_secret in config.yaml"
      - sh: test "$(yq eval '.proxmox_lxc_template_name' config.yaml)" != "REPLACE_ME"
        msg: "Set proxmox_lxc_template_name in config.yaml"
      - sh: test "$(yq eval '.proxmox_lxc_initial_password' config.yaml)" != "REPLACE_ME"
        msg: "Set proxmox_lxc_initial_password in config.yaml"
      - sh: test "$(yq eval '.unifi_api_url' config.yaml)" != "REPLACE_ME"
        msg: "Set unifi_api_url in config.yaml"
      - sh: test "$(yq eval '.unifi_username' config.yaml)" != "REPLACE_ME"
        msg: "Set unifi_username in config.yaml"
      - sh: test "$(yq eval '.unifi_password' config.yaml)" != "REPLACE_ME"
        msg: "Set unifi_password in config.yaml"

  deploy-honcho:
    desc: Render config, provision the Honcho host, and configure Honcho, PostgreSQL, and Redis
    cmds:
      - task: configure
      - task: terraform:init-honcho
      - task: terraform:apply-honcho
      - task: ansible:bootstrap-honcho
      - task: ansible:configure-honcho
    preconditions:
      - sh: test "$(yq eval '.proxmox_api_url' config.yaml)" != "REPLACE_ME"
        msg: "Set proxmox_api_url in config.yaml"
      - sh: test "$(yq eval '.proxmox_api_token_id' config.yaml)" != "REPLACE_ME"
        msg: "Set proxmox_api_token_id in config.yaml"
      - sh: test "$(yq eval '.proxmox_lxc_template_name' config.yaml)" != "REPLACE_ME"
        msg: "Set proxmox_lxc_template_name in config.yaml"
      - sh: test -z "$(yq eval '.proxmox_lxc_template_name' config.yaml | grep '\.tmp\.')"
        msg: "proxmox_lxc_template_name must be the final Proxmox template volume, not a temporary .tmp download path"
      - sh: yq eval '.proxmox_lxc_template_name' config.yaml | grep -q ':vztmpl/'
        msg: "proxmox_lxc_template_name must look like <storage>:vztmpl/<template-file>.tar.zst"
      - sh: test "$(yq eval '.proxmox_api_token_secret' config.yaml)" != "REPLACE_ME"
        msg: "Set proxmox_api_token_secret in config.yaml"
      - sh: test "$(yq eval '.proxmox_lxc_template_name' config.yaml)" != "REPLACE_ME"
        msg: "Set proxmox_lxc_template_name in config.yaml"
      - sh: test "$(yq eval '.proxmox_lxc_initial_password' config.yaml)" != "REPLACE_ME"
        msg: "Set proxmox_lxc_initial_password in config.yaml"
      - sh: test "$(yq eval '.unifi_api_url' config.yaml)" != "REPLACE_ME"
        msg: "Set unifi_api_url in config.yaml"
      - sh: test "$(yq eval '.unifi_username' config.yaml)" != "REPLACE_ME"
        msg: "Set unifi_username in config.yaml"
      - sh: test "$(yq eval '.unifi_password' config.yaml)" != "REPLACE_ME"
        msg: "Set unifi_password in config.yaml"

  deploy-infisical-data:
    desc: Deploy the Infisical data host and create K8s bootstrap secrets
    cmds:
      - |
        source scripts/load-bootstrap-secrets.sh all
        task configure && \
        task terraform:init-infisical-data && \
        task terraform:apply-infisical-data && \
        task ansible:bootstrap-infisical-data && \
        task ansible:configure-infisical-data && \
        task create-infisical-k8s-secrets
    preconditions:
      - sh: command -v rbw >/dev/null 2>&1
        msg: "rbw must be installed on the host workstation."
      - sh: RBW_PROFILE=bootstrap rbw config show >/dev/null 2>&1
        msg: "rbw bootstrap profile is not configured. Configure RBW_PROFILE=bootstrap first."
      - sh: command -v kubectl >/dev/null 2>&1
        msg: "kubectl must be installed."
      - sh: kubectl cluster-info >/dev/null 2>&1
        msg: "kubectl cannot reach the current cluster. Fix kubeconfig or cluster access before running deploy-infisical-data."
      - sh: yq --version 2>/dev/null | grep -q '^yq (https://github.com/mikefarah/yq/) version v4\.'
        msg: "deploy-infisical-data requires Mike Farah yq v4. Install the system package: go-yq."
      - sh: test "$(yq eval '.proxmox_api_url' config.yaml)" != "REPLACE_ME"
        msg: "Set proxmox_api_url in config.yaml"
      - sh: test "$(yq eval '.proxmox_api_token_id' config.yaml)" != "REPLACE_ME"
        msg: "Set proxmox_api_token_id in config.yaml"
      - sh: test "$(yq eval '.proxmox_lxc_template_name' config.yaml)" != "REPLACE_ME"
        msg: "Set proxmox_lxc_template_name in config.yaml"
      - sh: test -z "$(yq eval '.proxmox_lxc_template_name' config.yaml | grep '\.tmp\.')"
        msg: "proxmox_lxc_template_name must be the final Proxmox template volume, not a temporary .tmp download path"
      - sh: yq eval '.proxmox_lxc_template_name' config.yaml | grep -q ':vztmpl/'
        msg: "proxmox_lxc_template_name must look like <storage>:vztmpl/<template-file>.tar.zst"
      - sh: test "$(yq eval '.proxmox_api_token_secret' config.yaml)" != "REPLACE_ME"
        msg: "Set proxmox_api_token_secret in config.yaml"
      - sh: test "$(yq eval '.proxmox_lxc_initial_password' config.yaml)" != "REPLACE_ME"
        msg: "Set proxmox_lxc_initial_password in config.yaml"
      - sh: test "$(yq eval '.unifi_api_url' config.yaml)" != "REPLACE_ME"
        msg: "Set unifi_api_url in config.yaml"
      - sh: test "$(yq eval '.unifi_username' config.yaml)" != "REPLACE_ME"
        msg: "Set unifi_username in config.yaml"
      - sh: test "$(yq eval '.unifi_password' config.yaml)" != "REPLACE_ME"
        msg: "Set unifi_password in config.yaml"

  create-infisical-k8s-secrets:
    desc: Create or reconcile the Kubernetes namespace and bootstrap secrets for Infisical
    vars:
      INFISICAL_NS: infisical
      INFISICAL_DATA_IP: 10.0.10.85
    preconditions:
      - sh: '[ -n "$INFISICAL_DB_PASSWORD" ]'
        msg: "INFISICAL_DB_PASSWORD not set. Run: source scripts/load-bootstrap-secrets.sh"
      - sh: '[ -n "$INFISICAL_REDIS_PASSWORD" ]'
        msg: "INFISICAL_REDIS_PASSWORD not set. Run: source scripts/load-bootstrap-secrets.sh"
      - sh: '[ -n "$INFISICAL_ENCRYPTION_KEY" ]'
        msg: "INFISICAL_ENCRYPTION_KEY not set. Run: source scripts/load-bootstrap-secrets.sh"
      - sh: '[ -n "$INFISICAL_AUTH_SECRET" ]'
        msg: "INFISICAL_AUTH_SECRET not set. Run: source scripts/load-bootstrap-secrets.sh"
    cmds:
      - kubectl create namespace {{.INFISICAL_NS}} --dry-run=client -o yaml | kubectl apply -f -
      - |
        kubectl create secret generic infisical-secrets \
          --namespace={{.INFISICAL_NS}} \
          --from-literal="ENCRYPTION_KEY=${INFISICAL_ENCRYPTION_KEY}" \
          --from-literal="AUTH_SECRET=${INFISICAL_AUTH_SECRET}" \
          --from-literal="REDIS_URL=redis://:${INFISICAL_REDIS_PASSWORD}@{{.INFISICAL_DATA_IP}}:6379" \
          --from-literal="SITE_URL=https://infisical.local.bysliek.com" \
          --dry-run=client -o yaml | kubectl apply -f -
      - |
        kubectl create secret generic infisical-postgres-connection \
          --namespace={{.INFISICAL_NS}} \
          --from-literal="connectionString=postgresql://infisical:${INFISICAL_DB_PASSWORD}@{{.INFISICAL_DATA_IP}}:5432/infisical?sslmode=disable" \
          --dry-run=client -o yaml | kubectl apply -f -

  reconfigure-honcho:
    desc: Re-render Honcho Ansible templates and reapply Honcho runtime configuration
    preconditions:
      - sh: ip route get "$(yq eval '.honcho_ip' config.yaml)" >/dev/null 2>&1
        msg: "No local route to honcho_ip from this environment"
      - sh: bash -lc 'ip="$(yq eval ".honcho_ip" config.yaml)"; exec 3<>/dev/tcp/${ip}/22'
        msg: "Cannot reach Honcho SSH on honcho_ip. Run task deploy-honcho first, or verify the LXC is up and reachable."
    cmds:
      - task: render-honcho-ansible
      - task: ansible:reconfigure-honcho-runtime
