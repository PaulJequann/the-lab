---

- name: Install GlitchTip data host packages
  ansible.builtin.apt:
    update_cache: true
    name:
      - acl
      - nfs-common
      - postgresql
      - postgresql-client
      - python3-psycopg2
      - redis-server
    state: present

- name: Ensure PostgreSQL backup mount point exists
  ansible.builtin.file:
    path: "{{ glitchtip_backup_mount_point }}"
    state: directory
    mode: "0755"
  when: glitchtip_backup_enabled | bool

- name: Mount PostgreSQL backup export
  ansible.posix.mount:
    path: "{{ glitchtip_backup_mount_point }}"
    src: "{{ glitchtip_backup_nfs_server }}:{{ glitchtip_backup_nfs_path }}"
    fstype: nfs
    opts: rw,_netdev,nfsvers=4.1
    state: mounted
  when: glitchtip_backup_enabled | bool

- name: Discover PostgreSQL cluster version
  ansible.builtin.command: pg_lsclusters --no-header
  register: glitchtip_pg_lsclusters
  changed_when: false

- name: Set PostgreSQL facts
  ansible.builtin.set_fact:
    glitchtip_postgres_version: "{{ glitchtip_pg_lsclusters.stdout_lines[0].split()[0] }}"
    glitchtip_postgres_config_dir: "/etc/postgresql/{{ glitchtip_pg_lsclusters.stdout_lines[0].split()[0] }}/main"

- name: Validate additional PostgreSQL database definitions
  ansible.builtin.assert:
    that:
      - managed_database.name is string
      - managed_database.name | length > 0
      - managed_database.user is string
      - managed_database.user | length > 0
      - managed_database.password is string
      - managed_database.password | length > 0
      - managed_database.allowed_cidrs is sequence
      - managed_database.allowed_cidrs is not string
      - managed_database.allowed_cidrs | length > 0
    fail_msg: "Each glitchtip_postgres_additional_databases entry must include name, user, password, and at least one allowed_cidrs value."
  loop: "{{ glitchtip_postgres_additional_databases | default([]) }}"
  loop_control:
    loop_var: managed_database
  no_log: true

- name: Build managed PostgreSQL database definitions
  ansible.builtin.set_fact:
    glitchtip_postgres_managed_databases: "{{ [{'name': glitchtip_postgres_db, 'user': glitchtip_postgres_user, 'password': glitchtip_postgres_password, 'allowed_cidrs': [node_network]}] + (glitchtip_postgres_additional_databases | default([])) }}"

- name: Configure PostgreSQL listen addresses
  ansible.builtin.lineinfile:
    path: "{{ glitchtip_postgres_config_dir }}/postgresql.conf"
    regexp: '^#?listen_addresses\s*='
    line: "listen_addresses = '{{ glitchtip_postgres_listen_addresses }}'"
  notify: Restart postgresql

- name: Allow managed application CIDRs into PostgreSQL
  ansible.builtin.blockinfile:
    path: "{{ glitchtip_postgres_config_dir }}/pg_hba.conf"
    marker: "# {mark} ANSIBLE MANAGED GLITCHTIP"
    block: |
      {% for managed_database in glitchtip_postgres_managed_databases %}
      {% for allowed_cidr in managed_database.allowed_cidrs %}
      host    {{ managed_database.name }}    {{ managed_database.user }}    {{ allowed_cidr }}    scram-sha-256
      {% endfor %}
      {% endfor %}
  notify: Restart postgresql

- name: Ensure PostgreSQL service is enabled and started
  ansible.builtin.systemd:
    name: "postgresql@{{ glitchtip_postgres_version }}-main"
    enabled: true
    state: started

- name: Ensure managed PostgreSQL roles exist
  community.postgresql.postgresql_user:
    name: "{{ managed_database.user }}"
    role_attr_flags: LOGIN
    state: present
    login_unix_socket: /var/run/postgresql
  loop: "{{ glitchtip_postgres_managed_databases }}"
  loop_control:
    loop_var: managed_database
  become_user: postgres
  no_log: true

- name: Ensure managed PostgreSQL role passwords are current
  ansible.builtin.shell: |
    python3 - <<'PY'
    import os
    import psycopg2
    from psycopg2 import sql

    conn = psycopg2.connect(dbname="postgres", user="postgres")
    conn.autocommit = True

    with conn, conn.cursor() as cur:
        cur.execute(
            sql.SQL("ALTER ROLE {} WITH LOGIN PASSWORD %s").format(
                sql.Identifier(os.environ["GLITCHTIP_POSTGRES_USER"])
            ),
            (os.environ["GLITCHTIP_POSTGRES_PASSWORD"],),
        )
    PY
  args:
    executable: /bin/bash
  environment:
    GLITCHTIP_POSTGRES_USER: "{{ managed_database.user }}"
    GLITCHTIP_POSTGRES_PASSWORD: "{{ managed_database.password }}"
  loop: "{{ glitchtip_postgres_managed_databases }}"
  loop_control:
    loop_var: managed_database
  become_user: postgres
  changed_when: false
  no_log: true

- name: Ensure managed PostgreSQL databases exist
  community.postgresql.postgresql_db:
    name: "{{ managed_database.name }}"
    owner: "{{ managed_database.user }}"
    encoding: "{{ glitchtip_postgres_db_encoding }}"
    template: "{{ glitchtip_postgres_db_template }}"
    lc_collate: "{{ glitchtip_postgres_db_lc_collate }}"
    lc_ctype: "{{ glitchtip_postgres_db_lc_ctype }}"
    state: present
    login_unix_socket: /var/run/postgresql
  loop: "{{ glitchtip_postgres_managed_databases }}"
  loop_control:
    loop_var: managed_database
  become_user: postgres

- name: Configure Redis bind address
  ansible.builtin.lineinfile:
    path: /etc/redis/redis.conf
    regexp: '^bind '
    line: "bind {{ glitchtip_redis_bind }}"
  notify: Restart redis

- name: Configure Redis port
  ansible.builtin.lineinfile:
    path: /etc/redis/redis.conf
    regexp: '^port '
    line: "port {{ glitchtip_redis_port }}"
  notify: Restart redis

- name: Enforce Redis protected mode
  ansible.builtin.lineinfile:
    path: /etc/redis/redis.conf
    regexp: '^protected-mode '
    line: 'protected-mode yes'
  notify: Restart redis

- name: Enable Redis appendonly persistence
  ansible.builtin.lineinfile:
    path: /etc/redis/redis.conf
    regexp: '^appendonly '
    line: "appendonly {{ glitchtip_redis_appendonly }}"
  notify: Restart redis

- name: Configure Redis password
  ansible.builtin.lineinfile:
    path: /etc/redis/redis.conf
    regexp: '^#?requirepass '
    line: "requirepass {{ glitchtip_redis_password }}"
  notify: Restart redis

- name: Ensure Redis service is enabled and started
  ansible.builtin.systemd:
    name: redis-server
    enabled: true
    state: started

- name: Install PostgreSQL backup script
  ansible.builtin.template:
    src: postgresql-backup.sh
    dest: /usr/local/bin/glitchtip-postgresql-backup.sh
    mode: '0750'
  when: glitchtip_backup_enabled | bool

- name: Install PostgreSQL backup service
  ansible.builtin.template:
    src: postgresql-backup.service
    dest: /etc/systemd/system/glitchtip-postgresql-backup.service
    mode: '0644'
  notify: Reload systemd
  when: glitchtip_backup_enabled | bool

- name: Install PostgreSQL backup timer
  ansible.builtin.template:
    src: postgresql-backup.timer
    dest: /etc/systemd/system/glitchtip-postgresql-backup.timer
    mode: '0644'
  notify: Reload systemd
  when: glitchtip_backup_enabled | bool

- name: Enable PostgreSQL backup timer
  ansible.builtin.systemd:
    name: glitchtip-postgresql-backup.timer
    enabled: true
    state: started
  when: glitchtip_backup_enabled | bool
