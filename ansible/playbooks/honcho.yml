---
- name: Configure Honcho host
  hosts: services
  become: true
  gather_facts: true
  pre_tasks:
    - name: Load service variables
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../group_vars/services.yaml"

    - name: Load encrypted service variables
      community.sops.load_vars:
        file: "{{ playbook_dir }}/../group_vars/services.sops.yaml"

  roles:
    - honcho