---
fail_fast: false
repos:
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.31.0
    hooks:
      - args:
          - --config-file
          - .yamllint.yaml
        id: yamllint
  - repo: https://github.com/gruntwork-io/pre-commit
    rev: v0.1.21
    hooks:
      - id: terraform-fmt

  - repo: local
    hooks:
      - id: infisical-scan
        name: infisical scan git-changes
        entry: infisical scan git-changes --staged --redact --no-color --exit-code 1
        language: system
        pass_filenames: false
